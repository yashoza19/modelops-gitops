---
name: Validate GitOps Manifests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    name: Validate Kustomize and YAML

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.0.0"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run validation script
        run: ./scripts/validate.sh

  validate-paper:
    runs-on: ubuntu-latest
    name: Validate Paper Markdown

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint paper markdown
        run: markdownlint paper/ --config .markdownlint.json || true

  validate-schemas:
    runs-on: ubuntu-latest
    name: Validate against OpenShift schemas
    if: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubeconform
        run: |
          curl -L \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin

      - name: Validate against schemas
        run: |
          SCHEMA='https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master'
          SCHEMA="${SCHEMA}/{{ .NormalizedKubernetesVersion }}-standalone{{ .StrictSuffix }}"
          SCHEMA="${SCHEMA}/{{ .ResourceKind }}{{ .KindSuffix }}.json"
          kustomize build overlays/dev | kubeconform \
            -schema-location default \
            -schema-location "$SCHEMA"
