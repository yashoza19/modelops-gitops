apiVersion: operator.tekton.dev/v1alpha1
kind: TektonConfig
metadata:
  name: config
  annotations:
    argocd.argoproj.io/sync-wave: "35"
  labels:
    app.kubernetes.io/name: tekton-config
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: tekton-configuration
spec:
  profile: all
  targetNamespace: openshift-pipelines
  addon:
    params:
      - name: clusterTasks
        value: "true"
      - name: pipelineTemplates
        value: "true"
      - name: communityClusterTasks
        value: "false"
  pipeline:
    disable-affinity-assistant: false
    disable-creds-init: false
    disable-home-env-overwrite: true
    disable-working-directory-overwrite: true
    enable-api-fields: stable
    enable-custom-tasks: true
    enable-tekton-oci-bundles: true
    require-git-ssh-secret-known-hosts: false
    running-in-environment-with-injected-sidecars: true
    send-cloudevents-for-runs: false
  pruner:
    disabled: false
    resources:
      - pipelinerun
      - taskrun
    schedule: "0 8 * * *"
    keep: 100
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline-builder
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "36"
  labels:
    app.kubernetes.io/name: pipeline-builder
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: service-account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pipeline-builder
  annotations:
    argocd.argoproj.io/sync-wave: "36"
  labels:
    app.kubernetes.io/name: pipeline-builder
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: cluster-role
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - secrets
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
  - apiGroups:
      - tekton.dev
    resources:
      - tasks
      - clustertasks
      - taskruns
      - pipelines
      - pipelineruns
      - pipelineresources
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
  - apiGroups:
      - image.openshift.io
    resources:
      - imagestreams
      - imagestreams/layers
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
  - apiGroups:
      - build.openshift.io
    resources:
      - builds
      - buildconfigs
      - buildconfigs/webhooks
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - patch
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pipeline-builder
  annotations:
    argocd.argoproj.io/sync-wave: "37"
  labels:
    app.kubernetes.io/name: pipeline-builder
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: cluster-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pipeline-builder
subjects:
  - kind: ServiceAccount
    name: pipeline-builder
    namespace: openshift-pipelines
