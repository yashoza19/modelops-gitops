---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: model-build-pipeline
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "41"
  labels:
    app.kubernetes.io/name: model-build-pipeline
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: tekton-pipeline
spec:
  description: "Pipeline to download, validate, and package LLM models for deployment"
  params:
    - name: model-name
      description: HuggingFace model name
      type: string
      default: microsoft/DialoGPT-small
    - name: model-revision
      description: Specific git commit SHA for model version pinning
      type: string
      default: main
    - name: model-version
      description: Semantic version for the packaged model
      type: string
      default: v1.0.0
    - name: registry-url
      description: Container registry URL
      type: string
      default: quay.io/gitops-llm-paper
    - name: enable-validation
      description: Whether to run model validation tests
      type: string
      default: "true"
  workspaces:
    - name: models-cache
      description: Persistent workspace for model caching
    - name: build-context
      description: Build context for packaging
    - name: test-results
      description: Test results workspace
  tasks:
    - name: download-model
      taskRef:
        name: model-download-task
      params:
        - name: model-name
          value: $(params.model-name)
        - name: model-revision
          value: $(params.model-revision)
      workspaces:
        - name: models-cache
          workspace: models-cache
    - name: validate-model
      when:
        - input: $(params.enable-validation)
          operator: in
          values: ["true", "yes", "1"]
      runAfter:
        - download-model
      taskRef:
        name: model-validation-task
      params:
        - name: model-name
          value: $(params.model-name)
      workspaces:
        - name: models-cache
          workspace: models-cache
        - name: test-results
          workspace: test-results
    - name: package-model
      runAfter:
        - validate-model
      taskRef:
        name: model-package-task
      params:
        - name: model-name
          value: $(params.model-name)
        - name: model-version
          value: $(params.model-version)
        - name: registry-url
          value: $(params.registry-url)
      workspaces:
        - name: models-cache
          workspace: models-cache
        - name: build-context
          workspace: build-context
    - name: update-manifests
      runAfter:
        - package-model
      taskRef:
        name: manifest-update-task
      params:
        - name: model-name
          value: $(params.model-name)
        - name: model-version
          value: $(params.model-version)
        - name: registry-url
          value: $(params.registry-url)
      workspaces:
        - name: build-context
          workspace: build-context
  finally:
    - name: cleanup-cache
      taskRef:
        name: cleanup-task
      params:
        - name: workspace-path
          value: "/tekton/models"
      workspaces:
        - name: models-cache
          workspace: models-cache
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: model-validation-task
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  labels:
    app.kubernetes.io/name: model-validation-task
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: tekton-task
spec:
  description: Validates downloaded model integrity and basic functionality
  params:
    - name: model-name
      description: Model name to validate
      type: string
  workspaces:
    - name: models-cache
      description: Workspace with downloaded models
      mountPath: /tekton/models
    - name: test-results
      description: Workspace for test outputs
      mountPath: /tekton/tests
  steps:
    - name: validate-model-files
      image: quay.io/huggingface/transformers-pytorch-gpu@sha256:9f25c56f71f2e1bb6b3d4b5a7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Validating model files for $(params.model-name)"

        # Check if model directory exists
        MODEL_DIR="/tekton/models/$(params.model-name)"
        if [ ! -d "$MODEL_DIR" ]; then
          echo "ERROR: Model directory not found: $MODEL_DIR"
          exit 1
        fi

        # Validate model can be loaded
        python -c "
        from transformers import AutoModel, AutoTokenizer
        import os
        import json

        model_dir = '/tekton/models/$(params.model-name)'
        results = {'validation_passed': False, 'errors': []}

        try:
            print('Loading tokenizer...')
            tokenizer = AutoTokenizer.from_pretrained(model_dir)
            print('Tokenizer loaded successfully')

            print('Loading model...')
            model = AutoModel.from_pretrained(model_dir)
            print('Model loaded successfully')

            # Test basic tokenization
            test_text = 'Hello, world!'
            tokens = tokenizer.encode(test_text)
            decoded = tokenizer.decode(tokens)
            print(f'Tokenization test: {test_text} -> {tokens} -> {decoded}')

            results['validation_passed'] = True
            results['message'] = 'Model validation passed'

        except Exception as e:
            results['errors'].append(str(e))
            print(f'ERROR: Model validation failed: {e}')

        # Write results
        with open('/tekton/tests/validation_results.json', 'w') as f:
            json.dump(results, f, indent=2)

        if not results['validation_passed']:
            exit(1)
        "

        echo "Model validation completed successfully"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 2Gi
      env:
        - name: HF_HOME
          value: /tekton/models
        - name: TRANSFORMERS_CACHE
          value: /tekton/models
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: manifest-update-task
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  labels:
    app.kubernetes.io/name: manifest-update-task
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: tekton-task
spec:
  description: Updates Kubernetes manifests with new model image reference
  params:
    - name: model-name
      description: Model name
      type: string
    - name: model-version
      description: Model version
      type: string
    - name: registry-url
      description: Container registry URL
      type: string
  workspaces:
    - name: build-context
      description: Build context workspace
      mountPath: /tekton/build
  steps:
    - name: generate-model-manifest
      image: registry.access.redhat.com/ubi9/ubi-minimal@sha256:bc552efb4966aaa44b02532be3560ac2c7f98b4ca5dbe5ab5b8fa3ffc4ac61dc
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Generating model manifest for $(params.model-name):$(params.model-version)"

        MODEL_IMAGE="$(params.registry-url)/$(params.model-name):$(params.model-version)"

        cat > /tekton/build/model-manifest.yaml <<EOF
        apiVersion: serving.kserve.io/v1beta1
        kind: InferenceService
        metadata:
          name: $(params.model-name)
          namespace: gitops-llm-models
          annotations:
            serving.knative.dev/creator: tekton-pipeline
            argocd.argoproj.io/sync-wave: "50"
          labels:
            app.kubernetes.io/name: $(params.model-name)
            app.kubernetes.io/part-of: gitops-llm-paper
            app.kubernetes.io/component: inference-service
            model.version: $(params.model-version)
        spec:
          predictor:
            containers:
              - name: kserve-container
                image: "placeholder-registry/model-name:placeholder-tag"
                resources:
                  requests:
                    cpu: "1"
                    memory: "4Gi"
                  limits:
                    cpu: "2"
                    memory: "8Gi"
                env:
                  - name: MODEL_NAME
                    value: $(params.model-name)
                  - name: MODEL_VERSION
                    value: $(params.model-version)
        EOF

        echo "Model manifest generated:"
        cat /tekton/build/model-manifest.yaml
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup-task
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  labels:
    app.kubernetes.io/name: cleanup-task
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: tekton-task
spec:
  description: Cleanup task to remove temporary files and caches
  params:
    - name: workspace-path
      description: Path to clean up
      type: string
  workspaces:
    - name: models-cache
      description: Workspace to clean
      mountPath: /tekton/models
  steps:
    - name: cleanup-workspace
      image: registry.access.redhat.com/ubi9/ubi-minimal@sha256:bc552efb4966aaa44b02532be3560ac2c7f98b4ca5dbe5ab5b8fa3ffc4ac61dc
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false
        capabilities:
          drop:
            - ALL
      script: |
        #!/bin/bash
        set -euo pipefail

        echo "Cleaning up workspace: $(params.workspace-path)"

        # Remove temporary files, keep downloaded models for caching
        find $(params.workspace-path) -name "*.tmp" -delete || true
        find $(params.workspace-path) -name "*.log" -delete || true

        echo "Workspace cleanup completed"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
