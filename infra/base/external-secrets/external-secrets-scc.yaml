apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "17"
  labels:
    app.kubernetes.io/name: external-secrets-scc
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: security
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegedContainer: false
allowedCapabilities: null
defaultAddCapabilities: null
fsGroup:
  type: RunAsAny
readOnlyRootFilesystem: true
requiredDropCapabilities:
  - KILL
  - MKNOD
  - SETUID
  - SETGID
runAsUser:
  type: MustRunAsRange
  uidRangeMin: 65534
  uidRangeMax: 65534
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users:
  - system:serviceaccount:external-secrets:external-secrets
  - system:serviceaccount:external-secrets:external-secrets-webhook
  - system:serviceaccount:external-secrets:external-secrets-cert-controller
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
