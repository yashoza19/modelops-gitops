---
apiVersion: v1
kind: Secret
metadata:
  name: fake-backend-config
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "25"
  labels:
    app.kubernetes.io/name: fake-backend-config
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: secret-store-config
type: Opaque
data:
  # Base64 encoded dummy values for fake backend
  access_key: ZmFrZS1hY2Nlc3Mta2V5  # fake-access-key
  secret_key: ZmFrZS1zZWNyZXQta2V5  # fake-secret-key
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: fake-secret-store
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "26"
  labels:
    app.kubernetes.io/name: fake-secret-store
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: secret-store
spec:
  provider:
    fake:
      data:
        - key: api-key
          value: fake-api-key-value
        - key: database-password
          value: fake-db-password
        - key: webhook-secret
          value: fake-webhook-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-external-secret
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "27"
  labels:
    app.kubernetes.io/name: demo-external-secret
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: external-secret
spec:
  refreshInterval: 30s
  secretStoreRef:
    kind: SecretStore
    name: fake-secret-store
    namespace: external-secrets
  target:
    name: demo-secret
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          app.kubernetes.io/name: demo-secret
          app.kubernetes.io/part-of: gitops-llm-paper
      data:
        api_key: "{{ .apikey | toString }}"
        db_password: "{{ .databasepassword | toString }}"
        webhook_secret: "{{ .webhooksecret | toString }}"
  data:
    - secretKey: apikey
      remoteRef:
        key: api-key
    - secretKey: databasepassword
      remoteRef:
        key: database-password
    - secretKey: webhooksecret
      remoteRef:
        key: webhook-secret
