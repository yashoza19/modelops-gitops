---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: external-secrets
      app.kubernetes.io/instance: external-secrets
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-secrets
        app.kubernetes.io/instance: external-secrets
        app.kubernetes.io/part-of: gitops-llm-paper
    spec:
      serviceAccountName: external-secrets
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: external-secrets
          image: ghcr.io/external-secrets/external-secrets@sha256:b8f7e4b8a3d7b4c6f8f2e6a5c3d4e7f9a2b1c8d5e6f7a8b9c0d1e2f3a4b5c6d7
          imagePullPolicy: IfNotPresent
          args:
            - --secure-metrics-addr=:8443
            - --metrics-addr=:8080
            - --enable-leader-election
            - --leader-election-namespace=external-secrets
            - --concurrent=1
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8443
              name: metrics-tls
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "18"
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: gitops-llm-paper
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-secrets-controller
  annotations:
    argocd.argoproj.io/sync-wave: "18"
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: gitops-llm-paper
rules:
  - apiGroups:
      - external-secrets.io
    resources:
      - secretstores
      - clustersecretstores
      - externalsecrets
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-secrets-controller
  annotations:
    argocd.argoproj.io/sync-wave: "19"
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: gitops-llm-paper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-secrets-controller
subjects:
  - kind: ServiceAccount
    name: external-secrets
    namespace: external-secrets
