---
apiVersion: v1
kind: Namespace
metadata:
  name: knative-serving
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: knative-serving
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: namespace
---
apiVersion: v1
kind: Namespace
metadata:
  name: kserve
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: kserve
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: namespace
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: kserve-operator
  namespace: operators
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: kserve-operator
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: operator
spec:
  channel: stable
  name: kserve-operator
  source: operatorhub.io
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: kserve-tritonserver
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: kserve-tritonserver
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: serving-runtime
spec:
  supportedModelFormats:
    - name: tensorrt
      version: "1"
      autoSelect: true
    - name: tensorflow
      version: "1"
      autoSelect: true
    - name: tensorflow
      version: "2"
      autoSelect: true
    - name: onnx
      version: "1"
      autoSelect: true
    - name: pytorch
      version: "1"
      autoSelect: true
    - name: triton
      version: "2"
      autoSelect: true
  containers:
    - name: kserve-container
      image: nvcr.io/nvidia/tritonserver@sha256:5c1cf39e4f8a5b2a3f0bf5e0fb1c8c9e5c8b5a1d0f1f1f1f1f1f1f1f1f1f1f1
      args:
        - tritonserver
        - --model-repository=/mnt/models
        - --grpc-port=9000
        - --http-port=8080
        - --metrics-port=8002
        - --allow-grpc=true
        - --allow-http=true
      resources:
        requests:
          cpu: 1
          memory: 2Gi
        limits:
          cpu: 1
          memory: 2Gi
