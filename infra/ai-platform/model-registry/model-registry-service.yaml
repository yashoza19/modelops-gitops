apiVersion: v1
kind: Service
metadata:
  name: model-registry-controller-metrics-service
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: model-registry-controller-metrics-service
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: service
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    app.kubernetes.io/name: model-registry-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry-api
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: model-registry-api
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: model-registry-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-registry-api
        app.kubernetes.io/part-of: gitops-llm-paper
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: model-registry-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api
        image: quay.io/opendatahub/model-registry@sha256:d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2
        env:
        - name: HOSTNAME
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: GRPC_PORT
          value: "9090"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: model-registry-db-secret
              key: database-url
        - name: AUTH_ENABLED
          value: "false"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: grpc
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/model_registry/v1alpha3/registered_models
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/model_registry/v1alpha3/registered_models
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-registry-api
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: model-registry-api
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: service-account
---
apiVersion: v1
kind: Service
metadata:
  name: model-registry-api
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: model-registry-api
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: service
spec:
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: grpc
    port: 9090
    protocol: TCP
    targetPort: 9090
  selector:
    app.kubernetes.io/name: model-registry-api
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: model-registry-api
  namespace: gitops-llm-platform
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    app.kubernetes.io/name: model-registry-api-route
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: route
spec:
  to:
    kind: Service
    name: model-registry-api
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
