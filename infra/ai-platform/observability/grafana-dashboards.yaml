---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-platform-dashboard
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: llm-platform-dashboard
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: dashboard
    grafana_dashboard: "true"
data:
  llm-platform-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "LLM Platform Overview",
        "tags": ["llm", "platform"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Model Inference Requests",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(vllm_request_duration_seconds_count[5m])",
                "legendFormat": "{{model}}",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "reqps"
              }
            }
          },
          {
            "id": 2,
            "title": "Model Response Latency (P99)",
            "type": "stat",
            "targets": [
              {
                "expr": "histogram_quantile(0.99, rate(vllm_request_duration_seconds_bucket[5m]))",
                "legendFormat": "{{model}}",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "s"
              }
            }
          },
          {
            "id": 3,
            "title": "GPU Memory Usage",
            "type": "timeseries",
            "targets": [
              {
                "expr": "nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes * 100",
                "legendFormat": "GPU {{gpu}} on {{instance}}",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "percent",
                "min": 0,
                "max": 100
              }
            }
          },
          {
            "id": 4,
            "title": "Vector DB Query Performance",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(postgresql_queries_total[5m])",
                "legendFormat": "Queries/sec",
                "refId": "A"
              },
              {
                "expr": "postgresql_query_duration_seconds{quantile=\"0.95\"}",
                "legendFormat": "P95 Latency",
                "refId": "B"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"}
              }
            }
          },
          {
            "id": 5,
            "title": "Model Cache Hit Rate",
            "type": "gauge",
            "targets": [
              {
                "expr": "rate(model_registry_cache_hits_total[5m]) / rate(model_registry_cache_requests_total[5m]) * 100",
                "legendFormat": "Cache Hit Rate",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 0, "y": 16},
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0},
                    {"color": "yellow", "value": 70},
                    {"color": "green", "value": 90}
                  ]
                },
                "unit": "percent",
                "min": 0,
                "max": 100
              }
            }
          },
          {
            "id": 6,
            "title": "Active Model Instances",
            "type": "stat",
            "targets": [
              {
                "expr": "count(up{job=\"vllm-models\"} == 1)",
                "legendFormat": "Active Models",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 8, "y": 16},
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"}
              }
            }
          },
          {
            "id": 7,
            "title": "Storage Usage",
            "type": "piechart",
            "targets": [
              {
                "expr": "kubelet_volume_stats_used_bytes{persistentvolumeclaim=~\".*model.*\"}",
                "legendFormat": "{{persistentvolumeclaim}}",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 8, "x": 16, "y": 16},
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "unit": "bytes"
              }
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vector-db-dashboard
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  labels:
    app.kubernetes.io/name: vector-db-dashboard
    app.kubernetes.io/part-of: gitops-llm-paper
    app.kubernetes.io/component: dashboard
    grafana_dashboard: "true"
data:
  vector-db-performance.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Vector Database Performance",
        "tags": ["vector", "database", "pgvector"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Vector Search Performance",
            "type": "timeseries",
            "targets": [
              {
                "expr": "rate(postgresql_queries_total{query=\"vector_search\"}[5m])",
                "legendFormat": "Vector Searches/sec",
                "refId": "A"
              },
              {
                "expr": "postgresql_query_duration_seconds{query=\"vector_search\", quantile=\"0.95\"}",
                "legendFormat": "P95 Search Latency",
                "refId": "B"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "id": 2,
            "title": "Database Connections",
            "type": "timeseries",
            "targets": [
              {
                "expr": "postgresql_connections{state=\"active\"}",
                "legendFormat": "Active Connections",
                "refId": "A"
              },
              {
                "expr": "postgresql_connections{state=\"idle\"}",
                "legendFormat": "Idle Connections",
                "refId": "B"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "id": 3,
            "title": "Index Efficiency",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(postgresql_index_scans_total[5m]) / rate(postgresql_table_scans_total[5m]) * 100",
                "legendFormat": "Index Usage %",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
          },
          {
            "id": 4,
            "title": "Vector Index Size",
            "type": "timeseries",
            "targets": [
              {
                "expr": "postgresql_index_size_bytes{index=~\".*embedding.*\"}",
                "legendFormat": "{{index}}",
                "refId": "A"
              }
            ],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }
