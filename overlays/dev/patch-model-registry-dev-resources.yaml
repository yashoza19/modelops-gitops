apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry-controller
  namespace: gitops-llm-platform
  labels:
    app.kubernetes.io/part-of: gitops-llm-paper
spec:
  template:
    spec:
      containers:
      - name: manager
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - mountPath: /tmp/model-cache
          name: model-cache
      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry-api
  namespace: gitops-llm-platform
  labels:
    app.kubernetes.io/part-of: gitops-llm-paper
spec:
  template:
    spec:
      containers:
      - name: api
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
