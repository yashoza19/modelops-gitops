# yamllint configuration for GitOps LLM Paper repository
extends: default

rules:
  line-length:
    max: 120  # Relaxed for manifest readability
    allow-non-breakable-inline-mappings: true

  comments:
    min-spaces-from-content: 1

  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false  # Allow "on" in ArgoCD annotations

ignore: |
  /.git/
  /paper/
  *.md